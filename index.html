<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>駐站護理師工時調派</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-strong: #f8fafc;
      --text: #172033;
      --muted: #64748b;
      --line: #d8e0ea;
      --primary: #0f766e;
      --primary-strong: #115e59;
      --danger: #b91c1c;
      --warning: #b45309;
      --success: #047857;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .subtitle,
    .user-meta,
    .muted {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .user-box {
      text-align: right;
      display: grid;
      gap: 4px;
      min-width: 220px;
      justify-items: end;
    }

    .test-mode-btn.is-active {
      background: #fffbeb;
      border-color: #f59e0b;
      color: #92400e;
    }

    .toolbar {
      padding: 14px 24px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
    }

    .bottom-toolbar {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      margin-top: 4px;
    }

    .layout {
      padding: 20px 24px 28px;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .panel-title {
      font-weight: 800;
      font-size: 1rem;
    }

    .panel-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.82rem;
      color: #334155;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      min-height: 42px;
      outline: none;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 6px;
      min-height: 40px;
      padding: 9px 13px;
      font-weight: 800;
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-strong);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
      border-color: #fecaca;
    }

    .btn-ghost {
      background: #fff;
      border-color: var(--line);
    }

    .content-stack {
      display: grid;
      gap: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 4px;
    }

    .stat-value {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--primary-strong);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .schedule-toolbar {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .schedule-toolbar .field {
      min-width: 0;
    }

    .schedule-layout {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .schedule-controls {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-strong);
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .schedule-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .schedule-nav .btn {
      min-height: 36px;
      padding: 7px 8px;
    }

    .schedule-main {
      min-width: 0;
    }

    .schedule-matrix-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-height: 68vh;
      background: #fff;
    }

    .schedule-day-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      max-height: 68vh;
      background: #fff;
    }

    .day-calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
      font-weight: 900;
    }

    .day-calendar {
      display: grid;
      grid-template-columns: 72px minmax(760px, 1fr);
      min-width: 860px;
    }

    .day-time-column,
    .day-events-column {
      position: relative;
      min-height: 1248px;
    }

    .day-time-column {
      border-right: 1px solid var(--line);
      background: #fff;
    }

    .day-hour-label,
    .day-hour-row {
      height: 52px;
      border-bottom: 1px solid var(--line);
    }

    .day-hour-label {
      padding: 4px 8px 0 0;
      text-align: right;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .day-hour-row {
      background: linear-gradient(to bottom, #fff, #fff 50%, #f8fafc 50%, #f8fafc);
    }

    .day-event {
      position: absolute;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 7px;
      overflow: hidden;
      font-size: 0.78rem;
      line-height: 1.3;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .day-event.movement-in {
      border-color: rgba(15, 118, 110, 0.2);
    }

    .day-event.movement-out {
      border-color: rgba(185, 28, 28, 0.2);
    }

    .nurse-option-unavailable {
      color: #92400e;
      background: #fffbeb;
    }

    .schedule-matrix {
      min-width: 3200px;
      border-collapse: separate;
      border-spacing: 0;
    }

    .schedule-matrix.is-month-view {
      min-width: 1980px;
    }

    .schedule-matrix th,
    .schedule-matrix td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      min-width: 154px;
    }

    .schedule-matrix th:first-child,
    .schedule-matrix td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 190px;
      background: #fff;
    }

    .schedule-matrix thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      text-align: center;
    }

    .schedule-matrix thead th:first-child {
      z-index: 4;
      background: var(--surface-strong);
    }

    .station-cell {
      font-weight: 900;
      background: #fff7ed !important;
    }

    .schedule-cell {
      vertical-align: top;
      background: #fff;
      min-height: 58px;
    }

    .schedule-cell.has-movement {
      background: #fef9c3;
    }

    .schedule-cell.is-green {
      background: #dcfce7;
    }

    .schedule-cell.is-red {
      background: #fee2e2;
    }

    .schedule-count {
      font-weight: 900;
      font-size: 0.82rem;
      color: #172033;
      margin-bottom: 6px;
    }

    .movement-entry {
      border-radius: 4px;
      padding: 5px 6px;
      margin-bottom: 5px;
      font-size: 0.78rem;
      line-height: 1.35;
      font-weight: 800;
      word-break: break-word;
    }

    .movement-in {
      background: rgba(15, 118, 110, 0.13);
      color: #115e59;
    }

    .movement-out {
      background: rgba(185, 28, 28, 0.13);
      color: #991b1b;
    }

    .schedule-entry {
      display: block;
      border-radius: 4px;
      padding: 5px 6px;
      margin: 0 0 5px;
      font-size: 0.78rem;
      line-height: 1.35;
      font-weight: 800;
      color: #263244;
      word-break: break-word;
    }

    .schedule-tone-0 { background: #fef9c3; color: #713f12; }
    .schedule-tone-1 { background: #dbeafe; color: #1e3a8a; }
    .schedule-tone-2 { background: #dcfce7; color: #14532d; }
    .schedule-tone-3 { background: #fce7f3; color: #831843; }
    .schedule-tone-4 { background: #ede9fe; color: #4c1d95; }
    .schedule-tone-5 { background: #ffedd5; color: #7c2d12; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    th,
    td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.9rem;
    }

    th {
      background: var(--surface-strong);
      color: #334155;
      font-size: 0.78rem;
      text-transform: none;
      white-space: nowrap;
    }

    .cell-main {
      font-weight: 800;
      color: var(--text);
    }

    .cell-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
      word-break: break-word;
    }

    .temp-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 3px 7px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      white-space: nowrap;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .status.error {
      color: var(--danger);
      font-weight: 800;
    }

    .status.success {
      color: var(--success);
      font-weight: 800;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface-strong);
    }

    .loading-screen {
      padding: 48px 24px;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .user-box {
        text-align: left;
        min-width: 0;
      }

      .toolbar,
      .layout,
      .stats,
      .schedule-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar,
      .toolbar,
      .layout {
        padding-left: 14px;
        padding-right: 14px;
      }

      .two-cols {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .topbar,
      .bottom-toolbar,
      .toolbar,
      .layout > .panel:first-child,
      #records-table-wrap,
      #records-empty,
      .schedule-toolbar,
      .schedule-controls {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .layout,
      .content-stack {
        display: block;
        padding: 0;
      }

      .panel {
        box-shadow: none;
        border: 0;
      }

      .schedule-matrix-wrap {
        max-height: none;
        overflow: visible;
        border: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>駐站護理師工時調派</h1>
        <div class="subtitle">正式人員與組別資料作為來源，僅同步標註臨時調配欄。</div>
      </div>
      <div class="user-box">
        <strong id="viewer-name">讀取中</strong>
        <span id="viewer-email" class="user-meta"></span>
        <button class="btn btn-ghost test-mode-btn hidden" type="button" id="test-mode-btn">啟用測試模式</button>
      </div>
    </header>

    <div id="loading" class="loading-screen">正在讀取駐站與護理師資料...</div>

    <main id="app-main" class="layout hidden">
      <section class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title" id="form-title">新增工時調派</div>
            <div class="muted">唯一鍵：護理師信箱 + 所屬組別代碼</div>
          </div>
          <button class="btn btn-ghost hidden" type="button" id="cancel-edit-btn">取消編輯</button>
        </div>
        <div class="panel-body">
          <form id="dispatch-form" class="form-grid">
            <input id="record-id" type="hidden">
            <div class="two-cols">
              <div class="field">
                <label for="dispatch-start-date">調派起日</label>
                <input id="dispatch-start-date" type="date" required>
              </div>
              <div class="field">
                <label for="dispatch-end-date">調派迄日</label>
                <input id="dispatch-end-date" type="date" required>
              </div>
            </div>
            <div class="field">
              <label for="nurse-origin-station">駐站</label>
              <select id="nurse-origin-station"></select>
            </div>
            <div class="field">
              <label for="nurse-select">主職護理師</label>
              <select id="nurse-select" required></select>
            </div>
            <div class="field">
              <label for="station-select">調派駐站</label>
              <select id="station-select" required></select>
            </div>
            <div class="two-cols">
              <div class="field">
                <label for="shift-name">班別</label>
                <select id="shift-name"></select>
              </div>
              <div class="field">
                <label for="hours-input">工作時數</label>
                <input id="hours-input" type="number" min="0.25" max="24" step="0.25" inputmode="decimal" required>
              </div>
            </div>
            <div class="two-cols">
              <div class="field">
                <label for="start-time">開始時間</label>
                <input id="start-time" type="time">
              </div>
              <div class="field">
                <label for="end-time">結束時間</label>
                <input id="end-time" type="time">
              </div>
            </div>
            <div class="field">
              <label for="note-input">備註</label>
              <textarea id="note-input" maxlength="300"></textarea>
            </div>
            <div class="status" id="form-status"></div>
            <div class="button-row">
              <button class="btn btn-ghost" type="button" id="clear-form-btn">清空</button>
              <button class="btn btn-primary" type="submit" id="save-btn">儲存調派</button>
            </div>
          </form>
        </div>
      </section>

      <div class="content-stack">
        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">區間統計</div>
              <div class="muted" id="summary-range">-</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="stats">
              <div class="stat">
                <div class="stat-value" id="stat-hours">0</div>
                <div class="stat-label">總工時</div>
              </div>
              <div class="stat">
                <div class="stat-value" id="stat-records">0</div>
                <div class="stat-label">調派筆數</div>
              </div>
              <div class="stat">
                <div class="stat-value" id="stat-nurses">0</div>
                <div class="stat-label">護理師人數</div>
              </div>
              <div class="stat">
                <div class="stat-value" id="stat-temp-count">0</div>
                <div class="stat-label">臨調次數</div>
              </div>
              <div class="stat">
                <div class="stat-value" id="stat-temp-hours">0</div>
                <div class="stat-label">臨調時數</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title" id="schedule-title">日曆</div>
              <div class="muted" id="schedule-description">依時間線顯示當日人員異動。</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="schedule-layout">
              <aside class="schedule-controls">
                <div class="schedule-toolbar">
                  <div class="field">
                    <label for="schedule-view">檢視</label>
                    <select id="schedule-view">
                      <option value="day">日</option>
                      <option value="week">週曆</option>
                      <option value="month">月曆</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="schedule-date">日期</label>
                    <input id="schedule-date" type="date">
                  </div>
                  <div class="schedule-nav">
                    <button class="btn btn-ghost" type="button" id="schedule-prev-day">前一天</button>
                    <button class="btn btn-ghost" type="button" id="schedule-next-day">後一天</button>
                  </div>
                  <button class="btn btn-ghost" type="button" id="schedule-today">今天</button>
                  <div class="field">
                    <label for="schedule-year">年度</label>
                    <input id="schedule-year" type="number" min="2020" max="2100" step="1">
                  </div>
                  <button class="btn btn-ghost" type="button" id="schedule-year-load">載入年度</button>
                  <button class="btn btn-ghost" type="button" id="print-schedule-btn">列印矩陣</button>
                </div>
              </aside>
              <div class="schedule-main">
                <div id="schedule-empty" class="empty hidden">目前沒有可產生日曆的駐站資料。</div>
                <div id="schedule-day-wrap" class="schedule-day-wrap hidden"></div>
                <div id="schedule-matrix-wrap" class="schedule-matrix-wrap hidden">
                  <table class="schedule-matrix" id="schedule-table">
                    <thead id="schedule-head"></thead>
                    <tbody id="schedule-body"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">調派紀錄</div>
              <div class="muted">依調派期間、駐站、開始時間排序</div>
            </div>
          </div>
          <div class="panel-body">
            <div id="records-empty" class="empty hidden">目前沒有符合條件的工時調派紀錄。</div>
            <div id="records-table-wrap" class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>期間</th>
                    <th>駐站</th>
                    <th>護理師</th>
                    <th>臨時調配</th>
                    <th>班別</th>
                    <th>時間</th>
                    <th>時數</th>
                    <th>備註</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="records-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>

    <section class="toolbar bottom-toolbar" id="toolbar">
      <div class="field">
        <label for="filter-date-from">起始日期</label>
        <input id="filter-date-from" type="date">
      </div>
      <div class="field">
        <label for="filter-date-to">結束日期</label>
        <input id="filter-date-to" type="date">
      </div>
      <div class="field">
        <label for="filter-station">駐站</label>
        <select id="filter-station"></select>
      </div>
      <div class="field">
        <label for="filter-nurse">護理師</label>
        <select id="filter-nurse"></select>
      </div>
      <div class="field">
        <label for="filter-keyword">紀錄數</label>
        <input id="record-count-display" type="text" readonly>
      </div>
      <button class="btn btn-primary" type="button" id="reload-btn">重新整理</button>
    </section>
  </div>

  <script>
    const state = {
      viewer: null,
      stations: [],
      nurses: [],
      records: [],
      scheduleRecords: [],
      currentRecords: [],
      filters: {},
      shiftOptions: [],
      isSaving: false,
      testMode: false,
      scheduleView: 'day',
      scheduleYear: new Date().getFullYear(),
      scheduleDate: getTodayString()
    };

    const FULL_SHIFT_BREAK_HOURS = 1;
    const FULL_SHIFT_BREAK_THRESHOLD_HOURS = 8;

    async function loadData(filters) {
      setPageLoading(true);
      setStatus('');
      try {
        const response = await callServer('getDispatchAppData', filters || {});
        if (!response || !response.success) {
          throw new Error(response && response.message ? response.message : '資料讀取失敗。');
        }
        applyData(response);
      } catch (error) {
        showLoadError(error && error.message ? error.message : '資料讀取失敗。');
      } finally {
        setPageLoading(false);
      }
    }

    function applyData(response) {
      state.viewer = response.viewer || {};
      state.stations = Array.isArray(response.stations) ? response.stations : [];
      state.nurses = Array.isArray(response.nurses) ? response.nurses : [];
      state.records = Array.isArray(response.records) ? response.records : [];
      state.scheduleRecords = Array.isArray(response.scheduleRecords) ? response.scheduleRecords : state.records.slice();
      state.currentRecords = Array.isArray(response.currentRecords) ? response.currentRecords : [];
      state.filters = response.filters || {};
      state.shiftOptions = Array.isArray(response.shiftOptions) ? response.shiftOptions : ['日班', '上午', '下午', '夜班'];
      state.testMode = Boolean(state.viewer && state.viewer.testMode);
      state.scheduleYear = inferScheduleYear();
      state.scheduleView = normalizeScheduleView(state.scheduleView);
      state.scheduleDate = normalizeDateInput(state.scheduleDate) || getDefaultDispatchDate();

      el.viewerName.textContent = state.viewer.name || '未命名使用者';
      el.viewerEmail.textContent = [state.viewer.email || '', state.testMode ? '測試模式' : ''].filter(Boolean).join('｜');
      renderTestModeControl();

      el.filterDateFrom.value = state.filters.dateFrom || '';
      el.filterDateTo.value = state.filters.dateTo || '';

      renderStationOptions();
      renderShiftOptions();
      renderFilterNurseOptions();
      renderFormNurseOptions();
      renderSummary();
      renderScheduleMatrix();
      renderRecords();

      if (!state.stations.length) {
        el.appMain.classList.add('hidden');
        el.loading.classList.remove('hidden');
        el.loading.textContent = state.viewer && state.viewer.canUseTestMode
          ? '目前一般權限沒有可管理的駐站。可按右上角「啟用測試模式」讀取測試候選。'
          : '目前登入帳號沒有可管理的駐站。';
        return;
      }

      el.appMain.classList.remove('hidden');
      el.recordCountDisplay.value = `${state.records.length} 筆`;
      el.scheduleView.value = state.scheduleView;
      el.scheduleDate.value = state.scheduleDate;
      el.scheduleYear.value = state.scheduleYear;
      if (!el.dispatchStartDate.value) el.dispatchStartDate.value = getDefaultDispatchDate();
      if (!el.dispatchEndDate.value) el.dispatchEndDate.value = el.dispatchStartDate.value;

    function renderDailyScheduleTimeline(dateString, scheduleStations) {
      const date = normalizeDateInput(dateString) || getTodayString();
      const events = buildDailyTimelineEvents(scheduleStations, date);
      el.scheduleTitle.textContent = '日曆';
      el.scheduleDescription.textContent = `${formatFullDate(date)} 依時間線顯示人員調入與調出。`;
      el.scheduleHead.innerHTML = '';
      el.scheduleBody.innerHTML = '';

      const hourLabels = Array.from({ length: 24 }, (_, hour) => (
        `<div class="day-hour-label">${String(hour).padStart(2, '0')}:00</div>`
      )).join('');
      const hourRows = Array.from({ length: 24 }, () => '<div class="day-hour-row"></div>').join('');
      const laneCount = events[0] ? events[0].laneCount : 1;
      const calendarMinWidth = Math.max(860, 72 + laneCount * 220);
      const eventHtml = events.map((event) => {
        const top = Math.max(0, event.startMinute / 60 * DAY_TIMELINE_HOUR_HEIGHT);
        const height = Math.max(30, (event.endMinute - event.startMinute) / 60 * DAY_TIMELINE_HOUR_HEIGHT);
        const width = 100 / event.laneCount;
        const left = event.lane * width;
        const style = [
          `top:${top}px`,
          `height:${height}px`,
          `left:calc(${left}% + 10px)`,
          `width:calc(${width}% - 14px)`
        ].join(';');
        return `
          <div class="day-event ${event.className}" style="${style}">
            <div>${escapeHtml(event.timeText)}｜${escapeHtml(event.direction)}｜${escapeHtml(event.nurseName)}</div>
            <div class="cell-sub">${escapeHtml(event.stationLabel)}</div>
            <div class="cell-sub">${escapeHtml(event.relatedText)}</div>
          </div>
        `;
      }).join('');

      el.scheduleDayWrap.innerHTML = `
        <div class="day-calendar-head">
          <div>${escapeHtml(formatFullDate(date))}</div>
          <div class="muted">${escapeHtml(formatNumber(events.length))} 筆異動</div>
        </div>
        ${events.length ? `
          <div class="day-calendar" style="min-width:${calendarMinWidth}px">
            <div class="day-time-column">${hourLabels}</div>
            <div class="day-events-column">${hourRows}${eventHtml}</div>
          </div>
        ` : '<div class="empty">此日沒有調派異動。</div>'}
      `;
    }

    function buildDailyTimelineEvents(scheduleStations, dateString) {
      const stationByCode = new Map(scheduleStations.map((station) => [station.code, station]));
      const sourceRecords = state.scheduleRecords.length ? state.scheduleRecords : state.records;
      const events = [];

      sourceRecords
        .filter((record) => (
          !isRecordNurseUnavailable(record)
          && getTemporaryDispatchInfo(record).isTemporary
          && recordOverlapsRange(record, dateString, dateString)
        ))
        .forEach((record) => {
          if (stationByCode.has(record.stationCode)) {
            events.push(buildDailyTimelineEvent(record, stationByCode.get(record.stationCode), 'in'));
          }
          if (stationByCode.has(record.originalStationCode)) {
            events.push(buildDailyTimelineEvent(record, stationByCode.get(record.originalStationCode), 'out'));
          }
        });

      return assignDailyEventLanes(events.filter(Boolean));
    }

    function buildDailyTimelineEvent(record, station, movementType) {
      const range = getDailyEventTimeRange(record);
      const isIncoming = movementType === 'in';
      const stationLabel = station.scheduleLabel || getStationDisplayName(station);
      const relatedText = isIncoming
        ? `原：${getScheduleRecordStationLabel(record, 'originalStationCode', 'originalStationName')}`
        : `至：${getScheduleRecordStationLabel(record, 'stationCode', 'stationName')}`;
      return {
        startMinute: range.start,
        endMinute: range.end,
        direction: isIncoming ? '調入' : '調出',
        className: isIncoming ? 'movement-in' : 'movement-out',
        stationLabel,
        relatedText,
        nurseName: record.nurseName || record.nurseEmail || '',
        timeText: formatMinuteRange(range.start, range.end)
      };
    }

    function assignDailyEventLanes(events) {
      const sorted = events
        .sort((a, b) => a.startMinute - b.startMinute || a.endMinute - b.endMinute || String(a.nurseName).localeCompare(String(b.nurseName), 'zh-Hant'));
      const laneEnds = [];
      sorted.forEach((event) => {
        let lane = laneEnds.findIndex((endMinute) => endMinute <= event.startMinute);
        if (lane < 0) {
          lane = laneEnds.length;
          laneEnds.push(0);
        }
        event.lane = lane;
        laneEnds[lane] = event.endMinute;
      });
      const laneCount = Math.max(1, laneEnds.length);
      sorted.forEach((event) => {
        event.laneCount = laneCount;
      });
      return sorted;
    }

    function getDailyEventTimeRange(record) {
      const startTime = String(record && record.startTime || '').trim();
      const endTime = String(record && record.endTime || '').trim();
      let start = startTime ? timeToMinutes(startTime) : 8 * 60;
      let end = endTime ? timeToMinutes(endTime) : start + 60;
      if (end <= start) end += 24 * 60;
      start = Math.max(0, Math.min(24 * 60 - 15, start));
      end = Math.max(start + 15, Math.min(24 * 60, end));
      return { start, end };
    }

    function buildScheduleStationRowHtml(station, cells) {
      const currentCount = getStationCountAtDate(station, getTodayString());
      const displayName = station.scheduleLabel || getStationDisplayName(station);
      const unavailableText = Number(station.unavailableMemberCount || 0) > 0
        ? `<div class="cell-sub">排除 ${escapeHtml(formatNumber(station.unavailableMemberCount))} 人</div>`
        : '';
      return `
        <tr>
          <td class="station-cell">
            <div class="cell-main">${escapeHtml(displayName)}（${escapeHtml(formatNumber(currentCount))}）</div>
            <div class="cell-sub">可用人力 ${escapeHtml(formatNumber(station.memberCount))} 人</div>
            ${unavailableText}
            <div class="cell-sub">即時在站 ${escapeHtml(formatNumber(currentCount))} 人</div>
          </td>
          ${cells}
        </tr>
      `;
    }

    function buildMonthlyScheduleCellData(station, month) {
      const stationCode = station.code;
      const baseCount = Number(station.memberCount || 0);
      const movements = getMonthlyMovementRecords(stationCode, month);
      const incomingKeys = new Set();
      const outgoingKeys = new Set();

      movements.forEach((record) => {
        if (record.stationCode === stationCode) incomingKeys.add(record.assignmentKey);
        if (record.originalStationCode === stationCode) outgoingKeys.add(record.assignmentKey);
      });

      const adjustedCount = Math.max(0, baseCount - outgoingKeys.size + incomingKeys.size);
      const className = buildScheduleCellClassName(adjustedCount, movements.length);
      const countText = baseCount === adjustedCount
        ? `人數 ${formatNumber(baseCount)}`
        : `人數 ${formatNumber(baseCount)}→${formatNumber(adjustedCount)}`;
      const movementHtml = buildGroupedMovementEntriesHtml(movements, stationCode, month.start, month.end);

      return {
        className,
        html: `<div class="schedule-count">${escapeHtml(countText)}</div>${movementHtml}`
      };
    }

    function buildWeeklyScheduleCellData(station, week) {
      const stationCode = station.code;
      const baseCount = Number(station.memberCount || 0);
      const movements = getWeeklyMovementRecords(stationCode, week);
      const incomingKeys = new Set();
      const outgoingKeys = new Set();

      movements.forEach((record) => {
        if (record.stationCode === stationCode) incomingKeys.add(record.assignmentKey);
        if (record.originalStationCode === stationCode) outgoingKeys.add(record.assignmentKey);
      });

      const adjustedCount = Math.max(0, baseCount - outgoingKeys.size + incomingKeys.size);
      const className = buildScheduleCellClassName(adjustedCount, movements.length);
      const countText = baseCount === adjustedCount
        ? `人數 ${formatNumber(baseCount)}`
        : `人數 ${formatNumber(baseCount)}→${formatNumber(adjustedCount)}`;
      const movementHtml = movements.map((record) => buildMovementEntryHtml(record, stationCode, week.start, week.end)).join('');

      return {
        className,
        html: `<div class="schedule-count">${escapeHtml(countText)}</div>${movementHtml}`
      };
    }

    function buildScheduleCellClassName(adjustedCount, movementCount) {
      const classes = [];
      if (movementCount) classes.push('has-movement');
      if (adjustedCount >= 3) classes.push('is-green');
      if (adjustedCount === 2) classes.push('is-red');
      return classes.join(' ');
    }

    function getScheduleStations() {
      const usedCodes = new Set();
      return SCHEDULE_STATION_RULES.map((rule) => {
        const station = state.stations.find((item) => {
          if (!item || usedCodes.has(item.code)) return false;
          return stationMatchesRule(item, rule);
        });
        if (!station) return null;
        usedCodes.add(station.code);
        return {
          ...station,
          scheduleLabel: rule.label
        };
      }).filter(Boolean);
    }

    function stationMatchesRule(station, rule) {
      const source = normalizeStationText([
        station.name,
        station.code,
        station.managerName
      ].filter(Boolean).join(' '));
      return (rule.keywords || []).some((keyword) => source.includes(normalizeStationText(keyword)));
    }

    function normalizeStationText(value) {
      return String(value || '')
        .replace(/\s+/g, '')
        .replace(/臺/g, '台')
        .replace(/[()（）]/g, '')
        .replace(/駐站/g, '')
        .toLowerCase();
    }

    function getScheduleStationLabelByCode(stationCode) {
      const station = state.stations.find((item) => item && item.code === stationCode);
      if (!station) return '';
      const rule = SCHEDULE_STATION_RULES.find((item) => stationMatchesRule(station, item));
      return rule ? rule.label : getStationDisplayName(station);
    }

    function getScheduleRecordStationLabel(record, codeKey, nameKey) {
      const code = record && record[codeKey];
      return getScheduleStationLabelByCode(code) || String(record && record[nameKey] || '').trim() || '未命名駐站';
    }

    function getStationCountAtDate(station, dateString) {
      const baseCount = Number(station && station.memberCount || 0);
      const stationCode = station && station.code;
      const incomingKeys = new Set();
      const outgoingKeys = new Set();
      const today = getTodayString();
      const sourceRecords = dateString === today && Array.isArray(state.currentRecords)
        ? state.currentRecords
        : (state.scheduleRecords.length ? state.scheduleRecords : state.records);

      sourceRecords.forEach((record) => {
        const temporaryInfo = getTemporaryDispatchInfo(record);
        if (isRecordNurseUnavailable(record) || !temporaryInfo.isTemporary || !recordOverlapsRange(record, dateString, dateString)) return;
        if (record.stationCode === stationCode) incomingKeys.add(record.assignmentKey);
        if (record.originalStationCode === stationCode) outgoingKeys.add(record.assignmentKey);
      });

      return Math.max(0, baseCount - outgoingKeys.size + incomingKeys.size);
    }

    function getMonthlyMovementRecords(stationCode, month) {
      const map = new Map();
      const sourceRecords = state.scheduleRecords.length ? state.scheduleRecords : state.records;
      sourceRecords
        .filter((record) => {
          const temporaryInfo = getTemporaryDispatchInfo(record);
          return !isRecordNurseUnavailable(record)
            && temporaryInfo.isTemporary
            && recordOverlapsRange(record, month.start, month.end)
            && (record.stationCode === stationCode || record.originalStationCode === stationCode);
        })
        .sort((a, b) => String(getRecordStartDate(a)).localeCompare(String(getRecordStartDate(b))))
        .forEach((record) => {
          map.set(`${record.id || record.assignmentKey}:${record.stationCode}:${record.originalStationCode}`, record);
        });
      return Array.from(map.values());
    }

    function getWeeklyMovementRecords(stationCode, week) {
      const map = new Map();
      const sourceRecords = state.scheduleRecords.length ? state.scheduleRecords : state.records;
      sourceRecords
        .filter((record) => {
          const temporaryInfo = getTemporaryDispatchInfo(record);
          return !isRecordNurseUnavailable(record)
            && temporaryInfo.isTemporary
            && recordOverlapsRange(record, week.start, week.end)
            && (record.stationCode === stationCode || record.originalStationCode === stationCode);
        })
        .sort((a, b) => String(getRecordStartDate(a)).localeCompare(String(getRecordStartDate(b))))
        .forEach((record) => {
          map.set(`${record.id || record.assignmentKey}:${record.stationCode}:${record.originalStationCode}`, record);
        });
      return Array.from(map.values());
    }

    function buildGroupedMovementEntriesHtml(records, stationCode, rangeStart, rangeEnd) {
      const groups = new Map();

      records.forEach((record) => {
        const overlapRange = getRecordOverlapRange(record, rangeStart, rangeEnd);
        if (!overlapRange) return;
        const isIncoming = record.stationCode === stationCode;
        const direction = isIncoming ? '+1 調入' : '-1 調出';
        const relatedText = isIncoming
          ? `原：${getRecordOriginalStationDisplayName(record)}`
          : `至：${getRecordTargetStationDisplayName(record)}`;
        const key = [
          direction,
          record.assignmentKey || record.nurseEmail || '',
          relatedText
        ].join('::');

        if (!groups.has(key)) {
          groups.set(key, {
            direction,
            relatedText,
            className: isIncoming ? 'movement-in' : 'movement-out',
            nurseName: record.nurseName || record.nurseEmail || '',
            ranges: [],
            days: 0,
            hours: 0
          });
        }
        const group = groups.get(key);
        group.ranges.push(overlapRange);
        const overlapDays = countDateRangeDays(overlapRange.start, overlapRange.end);
        group.days += overlapDays;
        group.hours += getDispatchHoursForDays(record, overlapDays);
      });

      return Array.from(groups.values()).map((group) => {
        const dateText = formatRangeList(group.ranges);
        const mainText = `${dateText} ${group.direction} ${group.nurseName}`;
        return `
          <div class="movement-entry ${group.className}">
            <div>${escapeHtml(mainText)}</div>
            <div class="cell-sub">${escapeHtml(formatDispatchStats(group.days, group.hours))}</div>
            <div class="cell-sub">${escapeHtml(group.relatedText)}</div>
          </div>
        `;
      }).join('');
    }

    function buildMovementEntryHtml(record, stationCode, rangeStart, rangeEnd) {
      const overlapRange = getRecordOverlapRange(record, rangeStart, rangeEnd) || getRecordDateRange(record);
      const overlapDays = countDateRangeDays(overlapRange.start, overlapRange.end);
      const isIncoming = record.stationCode === stationCode;
      const direction = isIncoming ? '+1 調入' : '-1 調出';
      const relatedText = isIncoming
        ? `原：${getRecordOriginalStationDisplayName(record)}`
        : `至：${getRecordTargetStationDisplayName(record)}`;
      const className = isIncoming ? 'movement-in' : 'movement-out';
      const mainText = `${formatDateRange(overlapRange.start, overlapRange.end)} ${direction} ${record.nurseName || record.nurseEmail}`;
      return `
        <div class="movement-entry ${className}">
          <div>${escapeHtml(mainText)}</div>
          <div class="cell-sub">${escapeHtml(formatDispatchStats(overlapDays, getDispatchHoursForDays(record, overlapDays)))}</div>
          <div class="cell-sub">${escapeHtml(relatedText)}</div>
        </div>
      `;
    }

    function loadScheduleYear() {
      const year = normalizeYear(el.scheduleYear.value);
      state.scheduleYear = year;
      if (String(state.scheduleDate || '').slice(0, 4) !== String(year)) {
        state.scheduleDate = `${year}-01-01`;
        el.scheduleDate.value = state.scheduleDate;
      }
      el.filterDateFrom.value = `${year}-01-01`;
      el.filterDateTo.value = `${year}-12-31`;
      loadData(collectFilters());
    }

    function setScheduleDate(value) {
      const normalizedDate = normalizeDateInput(value) || getTodayString();
      const year = Number(normalizedDate.slice(0, 4));
      const needsReload = year !== Number(state.scheduleYear)
        || !state.filters.dateFrom
        || !state.filters.dateTo
        || normalizedDate < state.filters.dateFrom
        || normalizedDate > state.filters.dateTo;

      state.scheduleDate = normalizedDate;
      el.scheduleDate.value = normalizedDate;
      if (needsReload) {
        state.scheduleYear = year;
        el.scheduleYear.value = year;
        el.filterDateFrom.value = `${year}-01-01`;
        el.filterDateTo.value = `${year}-12-31`;
        loadData(collectFilters());
        return;
      }

      renderScheduleMatrix();
    }

    function renderRecords() {
      if (!state.records.length) {
        el.recordsEmpty.classList.remove('hidden');
        el.recordsTableWrap.classList.add('hidden');
        el.recordsBody.innerHTML = '';
        return;
      }

      el.recordsEmpty.classList.add('hidden');
      el.recordsTableWrap.classList.remove('hidden');
      el.recordsBody.innerHTML = state.records.map((record) => {
        const temporaryInfo = getTemporaryDispatchInfo(record);
        return `
          <tr>
            <td>
              <div class="cell-main">${escapeHtml(formatDispatchDateRange(record))}</div>
              <div class="cell-sub">${escapeHtml(record.updatedAt || '')}</div>
            </td>
            <td>
              <div class="cell-main">${escapeHtml(getRecordTargetStationDisplayName(record))}</div>
            </td>
            <td>
              <div class="cell-main">${escapeHtml(record.nurseName || record.nurseEmail)}</div>
              <div class="cell-sub">${escapeHtml(record.nurseEmail)}</div>
            </td>
            <td>
              ${temporaryInfo.isTemporary ? '<span class="temp-badge">臨時調配</span>' : '<span class="muted">-</span>'}
              ${temporaryInfo.source ? `<div class="cell-sub">原：${escapeHtml(temporaryInfo.source)}</div>` : ''}
              ${temporaryInfo.isTemporary ? `<div class="cell-sub">${escapeHtml(formatDispatchStats(getDispatchDays(record), getDispatchTotalHours(record)))}</div>` : ''}
            </td>
            <td>${escapeHtml(record.shiftName || '')}</td>
            <td>${escapeHtml(formatTimeRange(record))}</td>
            <td><strong>${escapeHtml(formatNumber(getRecordWorkHours(record)))}</strong></td>
            <td>${escapeHtml(record.note || '')}</td>
            <td>
              <div class="actions">
                <button class="btn btn-ghost" type="button" data-edit="${escapeHtml(record.id)}">編輯</button>
                <button class="btn btn-danger" type="button" data-delete="${escapeHtml(record.id)}">刪除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      el.recordsBody.querySelectorAll('[data-edit]').forEach((button) => {
        button.addEventListener('click', () => editRecord(button.getAttribute('data-edit')));
      });
      el.recordsBody.querySelectorAll('[data-delete]').forEach((button) => {
        button.addEventListener('click', () => deleteRecord(button.getAttribute('data-delete')));
      });
    }

    async function saveDispatch(event) {
      event.preventDefault();
      if (state.isSaving) return;

      const station = getStationByCode(el.stationSelect.value);
      const nurse = getNursesForStation('').find((item) => item.assignmentKey === el.nurseSelect.value);

      if (!station || !nurse) {
        setStatus('請選擇有效的駐站與護理師。', 'error');
        return;
      }
      if (nurse.isUnavailable) {
        setStatus(`${nurse.name || nurse.email} 目前狀態為「${nurse.status || '不可調配'}」，不得調派。`, 'error');
        return;
      }
      if (!el.dispatchStartDate.value || !el.dispatchEndDate.value) {
        setStatus('請選擇調派起日與迄日。', 'error');
        return;
      }
      if (el.dispatchEndDate.value < el.dispatchStartDate.value) {
        setStatus('調派迄日不可早於調派起日。', 'error');
        return;
      }

      const payload = {
        id: el.recordId.value,
        startDate: el.dispatchStartDate.value,
        endDate: el.dispatchEndDate.value,
        workDate: el.dispatchStartDate.value,
        stationCode: station.code,
        assignmentKey: nurse.assignmentKey,
        shiftName: el.shiftName.value,
        startTime: el.startTime.value,
        endTime: el.endTime.value,
        hours: el.hoursInput.value,
        note: el.noteInput.value,
        testMode: state.testMode,
        filters: collectFilters()
      };

      state.isSaving = true;
      el.saveBtn.disabled = true;
      setStatus('儲存中...');

      try {
        const response = await callServer('saveWorkHourDispatch', payload);
        if (!response || !response.success) {
          throw new Error(response && response.message ? response.message : '儲存失敗。');
        }
        applyData(response);
        resetForm();
        setStatus('工時調派已儲存。', 'success');
      } catch (error) {
        setStatus(error && error.message ? error.message : '儲存失敗。', 'error');
      } finally {
        state.isSaving = false;
        el.saveBtn.disabled = false;
      }
    }

    function editRecord(id) {
      const record = state.records.find((item) => item.id === id);
      if (!record) return;

      el.recordId.value = record.id;
      el.formTitle.textContent = '編輯工時調派';
      el.cancelEditBtn.classList.remove('hidden');
      el.dispatchStartDate.value = getRecordStartDate(record);
      el.dispatchEndDate.value = getRecordEndDate(record);
      el.nurseOriginStation.value = record.originalStationCode || '';
      el.stationSelect.value = record.stationCode;
      renderFormNurseOptions();
      el.nurseSelect.value = record.assignmentKey;
      el.shiftName.value = record.shiftName || state.shiftOptions[0] || '日班';
      el.startTime.value = record.startTime || '';
      el.endTime.value = record.endTime || '';
      el.hoursInput.value = getRecordWorkHours(record);
      el.noteInput.value = record.note || '';
      setStatus('');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteRecord(id) {
      const record = state.records.find((item) => item.id === id);
      if (!record) return;
      const confirmed = window.confirm(`確定刪除 ${formatDispatchDateRange(record)} ${record.nurseName || record.nurseEmail} 的工時調派？`);
      if (!confirmed) return;

      setStatus('刪除中...');
      try {
        const response = await callServer('deleteWorkHourDispatch', {
          id,
          testMode: state.testMode,
          filters: collectFilters()
        });
        if (!response || !response.success) {
          throw new Error(response && response.message ? response.message : '刪除失敗。');
        }
        applyData(response);
        resetForm();
        setStatus('工時調派已刪除。', 'success');
      } catch (error) {
        setStatus(error && error.message ? error.message : '刪除失敗。', 'error');
      }
    }

    function resetForm() {
      el.recordId.value = '';
      el.formTitle.textContent = '新增工時調派';
      el.cancelEditBtn.classList.add('hidden');
      el.dispatchForm.reset();
      el.dispatchStartDate.value = getDefaultDispatchDate();
      el.dispatchEndDate.value = el.dispatchStartDate.value;
      el.nurseOriginStation.value = '';
      if (state.stations[0]) el.stationSelect.value = state.stations[0].code;
      renderFormNurseOptions();
      if (state.shiftOptions[0]) el.shiftName.value = state.shiftOptions[0];
      applyShiftDefaults(true);
      setStatus('');
    }

    function collectFilters() {
      return {
        dateFrom: el.filterDateFrom.value,
        dateTo: el.filterDateTo.value,
        stationCode: el.filterStation.value,
        nurseEmail: el.filterNurse.value,
        testMode: state.testMode
      };
    }

    function inferScheduleYear() {
      const source = state.filters.dateFrom || state.filters.dateTo || el.scheduleYear.value;
      const matched = String(source || '').match(/^(\d{4})/);
      return matched ? Number(matched[1]) : (state.scheduleYear || new Date().getFullYear());
    }

    function normalizeScheduleView(value) {
      return ['day', 'week', 'month'].includes(value) ? value : 'day';
    }

    function normalizeDateInput(value) {
      const raw = String(value || '').trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return '';
      const parsed = new Date(`${raw}T00:00:00+08:00`);
      return Number.isNaN(parsed.getTime()) ? '' : raw;
    }

    function normalizeYear(value) {
      const year = Number(value || new Date().getFullYear());
      if (!Number.isInteger(year) || year < 2020 || year > 2100) {
        return new Date().getFullYear();
      }
      return year;
    }

    function buildYearWeeks(year) {
      const endOfYear = `${year}-12-31`;
      const weeks = [];
      let cursor = `${year}-01-01`;

      while (cursor <= endOfYear) {
        const day = new Date(`${cursor}T00:00:00+08:00`).getDay();
        const daysToSunday = (7 - day) % 7;
        let weekEnd = addDaysToDateString(cursor, daysToSunday);
        if (weekEnd > endOfYear) weekEnd = endOfYear;

        weeks.push({
          index: weeks.length + 1,
          start: cursor,
          end: weekEnd
        });

        cursor = addDaysToDateString(weekEnd, 1);
      }

      return weeks;
    }

    function buildVisibleYearWeeks(year) {
      const weeks = buildYearWeeks(year);
      const currentYear = new Date().getFullYear();
      if (Number(year) !== currentYear) return weeks;

      const today = getTodayString();
      return weeks.filter((week) => week.end >= today);
    }

    function buildYearMonths(year) {
      const labels = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
      return labels.map((label, index) => {
        const month = index + 1;
        const start = `${year}-${String(month).padStart(2, '0')}-01`;
        const endDate = new Date(year, month, 0);
        const end = formatDateFromDate(endDate);
        return {
          index: month,
          label,
          start,
          end
        };
      });
    }

    function formatWeekRange(week) {
      return `${formatMonthDay(week.start)}-${formatMonthDay(week.end)}`;
    }

    function formatFullDate(dateString) {
      const labels = ['日', '一', '二', '三', '四', '五', '六'];
      const date = new Date(`${dateString}T00:00:00+08:00`);
      const weekday = Number.isNaN(date.getTime()) ? '' : `（週${labels[date.getDay()]}）`;
      return `${dateString}${weekday}`;
    }

    function formatMinuteRange(startMinute, endMinute) {
      return `${minutesToTime(startMinute)}-${minutesToTime(endMinute)}`;
    }

    function minutesToTime(minutes) {
      const normalized = Math.max(0, Math.min(24 * 60, Number(minutes || 0)));
      const hour = Math.floor(normalized / 60);
      const minute = Math.round(normalized % 60);
      return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
    }

    function getRecordStartDate(record) {
      return String(record && (record.startDate || record.workDate) || '').trim();
    }

    function getRecordEndDate(record) {
      return String(record && (record.endDate || record.workDate || record.startDate) || '').trim();
    }

    function getRecordDateRange(record) {
      return {
        start: getRecordStartDate(record),
        end: getRecordEndDate(record)
      };
    }

    function getRecordOverlapRange(record, rangeStart, rangeEnd) {
      const recordStart = getRecordStartDate(record);
      const recordEnd = getRecordEndDate(record);
      if (!recordStart || !recordEnd || !rangeStart || !rangeEnd) return null;
      const start = recordStart > rangeStart ? recordStart : rangeStart;
      const end = recordEnd < rangeEnd ? recordEnd : rangeEnd;
      return start <= end ? { start, end } : null;
    }

    function recordOverlapsRange(record, rangeStart, rangeEnd) {
      const recordStart = getRecordStartDate(record);
      const recordEnd = getRecordEndDate(record);
      if (!recordStart || !recordEnd || !rangeStart || !rangeEnd) return false;
      return recordStart <= rangeEnd && recordEnd >= rangeStart;
    }

    function formatDispatchDateRange(record) {
      const range = getRecordDateRange(record);
      return formatDateRange(range.start, range.end);
    }

    function formatRangeList(ranges) {
      const map = new Map();
      (ranges || []).forEach((range) => {
        const start = String(range && range.start || '').trim();
        const end = String(range && range.end || start).trim();
        if (!start) return;
        map.set(`${start}:${end}`, { start, end });
      });
      return Array.from(map.values())
        .sort((a, b) => String(a.start).localeCompare(String(b.start)))
        .map((range) => formatDateRange(range.start, range.end))
        .join('、');
    }

    function getDispatchDays(record) {
      return countDateRangeDays(getRecordStartDate(record), getRecordEndDate(record));
    }

    function countDateRangeDays(startDate, endDate) {
      if (!startDate || !endDate) return 0;
      return Math.max(1, daysBetween(startDate, endDate) + 1);
    }

    function getDispatchHoursForDays(record, days) {
      const hours = getRecordWorkHours(record);
      const normalizedDays = Number(days || 0);
      if (!Number.isFinite(hours) || !Number.isFinite(normalizedDays)) return 0;
      return Math.round(hours * normalizedDays * 100) / 100;
    }

    function getDispatchTotalHours(record) {
      return getDispatchHoursForDays(record, getDispatchDays(record));
    }

    function formatDispatchStats(days, hours) {
      return `${formatNumber(days)}天｜${formatNumber(hours)}h`;
    }

    function getRecordYear(record) {
      return Number(getRecordStartDate(record).slice(0, 4));
    }

    function getRecordMonth(record) {
      return Number(getRecordStartDate(record).slice(5, 7));
    }

    function compressDateRanges(dates) {
      const uniqueDates = Array.from(new Set(dates || []))
        .filter((date) => /^\d{4}-\d{2}-\d{2}$/.test(String(date || '')))
        .sort();
      const ranges = [];
      let start = '';
      let previous = '';

      uniqueDates.forEach((date) => {
        if (!start) {
          start = date;
          previous = date;
          return;
        }
        if (daysBetween(previous, date) === 1) {
          previous = date;
          return;
        }
        ranges.push(formatDateRange(start, previous));
        start = date;
        previous = date;
      });
      if (start) ranges.push(formatDateRange(start, previous));
      return ranges;
    }

    function formatDateRange(startDate, endDate) {
      const start = formatMonthDay(startDate);
      const end = formatMonthDay(endDate);
      if (startDate === endDate) return start;
      if (String(startDate).slice(0, 7) === String(endDate).slice(0, 7)) {
        return `${start}-${String(endDate).slice(8, 10).replace(/^0/, '')}`;
      }
      return `${start}-${end}`;
    }

    function formatMonthDay(date) {
      const month = String(date || '').slice(5, 7).replace(/^0/, '');
      const day = String(date || '').slice(8, 10).replace(/^0/, '');
      return `${month}/${day}`;
    }

    function daysBetween(left, right) {
      const leftTime = Date.parse(`${left}T00:00:00+08:00`);
      const rightTime = Date.parse(`${right}T00:00:00+08:00`);
      return Math.round((rightTime - leftTime) / 86400000);
    }

    function addDaysToDateString(dateString, days) {
      const date = new Date(`${dateString}T00:00:00+08:00`);
      date.setDate(date.getDate() + Number(days || 0));
      return formatDateFromDate(date);
    }

    function formatDateFromDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function hashToTone(value) {
      let hash = 0;
      String(value || '').split('').forEach((char) => {
        hash = ((hash << 5) - hash) + char.charCodeAt(0);
        hash |= 0;
      });
      return Math.abs(hash) % 6;
    }

    function updateHoursFromTimes() {
      if (!el.startTime.value || !el.endTime.value) return;
      const hours = calculateWorkHoursFromTime(el.startTime.value, el.endTime.value);
      if (Number.isFinite(hours) && hours > 0) {
        el.hoursInput.value = hours;
      }
    }

    function applyShiftDefaults(force) {
      if (!el.shiftName || el.shiftName.value !== '日班') return;
      const shouldFillTime = force || (!el.startTime.value && !el.endTime.value);
      if (shouldFillTime) {
        el.startTime.value = '07:30';
        el.endTime.value = '16:30';
      }
      if (force || !el.hoursInput.value) {
        el.hoursInput.value = '8';
      } else {
        updateHoursFromTimes();
      }
    }

    function getRecordWorkHours(record) {
      const rawHours = Number(record && record.hours || 0);
      const grossHours = calculateGrossHoursFromTime(record && record.startTime, record && record.endTime);
      const netHours = applyBreakDeduction(grossHours);
      if (Number.isFinite(rawHours) && rawHours > 0) {
        if (Number.isFinite(grossHours) && Math.abs(rawHours - grossHours) < 0.01) return netHours;
        return Math.round(rawHours * 100) / 100;
      }
      return Number.isFinite(netHours) ? netHours : 0;
    }

    function calculateWorkHoursFromTime(startTime, endTime) {
      return applyBreakDeduction(calculateGrossHoursFromTime(startTime, endTime));
    }

    function calculateGrossHoursFromTime(startTime, endTime) {
      if (!startTime || !endTime) return 0;
      const start = timeToMinutes(startTime);
      let end = timeToMinutes(endTime);
      if (end <= start) end += 24 * 60;
      return Math.round(((end - start) / 60) * 100) / 100;
    }

    function applyBreakDeduction(hours) {
      const normalized = Number(hours || 0);
      if (!Number.isFinite(normalized) || normalized <= 0) return 0;
      const adjusted = normalized > FULL_SHIFT_BREAK_THRESHOLD_HOURS
        ? normalized - FULL_SHIFT_BREAK_HOURS
        : normalized;
      return Math.round(Math.max(0, adjusted) * 100) / 100;
    }

    function getNursesForStation(stationCode) {
      const map = new Map();
      (state.nurses || []).forEach((nurse) => {
        if (stationCode && nurse.orgCode !== stationCode) return;
        if (!map.has(nurse.assignmentKey)) map.set(nurse.assignmentKey, nurse);
      });
      return Array.from(map.values()).sort((a, b) => {
        if (Boolean(a.isUnavailable) !== Boolean(b.isUnavailable)) return a.isUnavailable ? 1 : -1;
        return String(a.name || a.email).localeCompare(String(b.name || b.email), 'zh-Hant');
      });
    }

    function getTemporaryDispatchInfo(record) {
      const originalCode = String(record && record.originalStationCode || '').trim();
      const targetCode = String(record && record.stationCode || '').trim();
      const source = getRecordOriginalStationDisplayName(record);
      const isTemporary = Boolean(record && record.temporaryDispatchLabel)
        || Boolean(originalCode && targetCode && originalCode !== targetCode);
      return {
        isTemporary,
        source: isTemporary ? source : ''
      };
    }

    function isRecordNurseUnavailable(record) {
      return Boolean(record && record.isNurseUnavailable);
    }

    function getStationByCode(code) {
      return state.stations.find((station) => station.code === code) || null;
    }

    function getStationDisplayName(station) {
      return String(station && station.name || '').trim() || '未命名駐站';
    }

    function getRecordTargetStationDisplayName(record) {
      return getScheduleRecordStationLabel(record, 'stationCode', 'stationName') || '未命名駐站';
    }

    function getRecordOriginalStationDisplayName(record) {
      return getScheduleRecordStationLabel(record, 'originalStationCode', 'originalStationName') || '未命名駐站';
    }

    function getNurseOptionLabel(nurse) {
      return [
        String(nurse && (nurse.name || nurse.email) || '').trim() || '未命名人員',
        String(nurse && nurse.email || '').trim(),
        String(nurse && nurse.orgName || '').trim() || '未命名原駐站'
      ].filter(Boolean).join('｜');
    }

    function callServer(functionName, payload) {
      return new Promise((resolve, reject) => {
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
          reject(new Error('此頁面需要部署在 Google Apps Script Web App。'));
          return;
        }

        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((error) => {
            reject(new Error(error && error.message ? error.message : String(error || '伺服器呼叫失敗。')));
          });
        runner[functionName](payload);
      });
    }

    function setPageLoading(isLoading) {
      if (isLoading) {
        el.loading.classList.remove('hidden');
        el.loading.textContent = '正在讀取駐站與護理師資料...';
      } else if (state.stations.length) {
        el.loading.classList.add('hidden');
      }
      el.reloadBtn.disabled = isLoading;
    }

    function showLoadError(message) {
      el.appMain.classList.add('hidden');
      el.loading.classList.remove('hidden');
      el.loading.textContent = message;
      el.viewerName.textContent = '讀取失敗';
      el.viewerEmail.textContent = '';
    }

    function setStatus(message, type) {
      el.formStatus.textContent = message || '';
      el.formStatus.className = `status${type ? ` ${type}` : ''}`;
    }

    function formatTimeRange(record) {
      if (record.startTime && record.endTime) return `${record.startTime} 至 ${record.endTime}`;
      if (record.startTime) return `${record.startTime} 起`;
      return '';
    }

    function timeToMinutes(value) {
      const parts = String(value || '').split(':').map(Number);
      return parts[0] * 60 + parts[1];
    }

    function formatNumber(value) {
      const numberValue = Number(value || 0);
      if (!Number.isFinite(numberValue)) return '0';
      return String(Math.round(numberValue * 100) / 100);
    }

    function getTodayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getDefaultDispatchDate() {
      const today = getTodayString();
      const dateFrom = String(state.filters && state.filters.dateFrom || '').trim();
      const dateTo = String(state.filters && state.filters.dateTo || '').trim();

      if (dateFrom && today < dateFrom) return dateFrom;
      if (dateTo && today > dateTo) return dateTo;
      return today;
    }

    function toCamel(id) {
      return id.replace(/-([a-z])/g, (_, char) => char.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
